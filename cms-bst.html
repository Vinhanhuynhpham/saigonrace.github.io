<audio id="warningSound" src="sound & music\videoplayback.mp3"></audio>

<script>
  let isPlaying = false;

  function toggleAudio() {
    const audio = document.getElementById("warningSound");
    const icon = document.getElementById("audioIcon");

    if (!audio) return;

    if (isPlaying) {
      // Đang phát → dừng lại
      audio.pause();
      audio.currentTime = 0;
      icon.innerText = "🔇";
      isPlaying = false;
    } else {
      // Phát lại từ đầu
      audio.currentTime = 0;
      audio.play().then(() => {
        icon.innerText = "🔊";
        isPlaying = true;
      }).catch((err) => {
        alert("⚠️ Trình duyệt đang chặn phát âm thanh.");
      });
    }
  }

  // Sau khi phát xong tự reset lại isPlaying để người dùng có thể nhấn lần nữa
  document.getElementById("warningSound").addEventListener("ended", () => {
    isPlaying = false;
    const icon = document.getElementById("audioIcon");
    if (icon) icon.innerText = "🔇";
  });
</script>
